<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — NC AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a0f;
  color:#e0e0e0;
  font-family:'Inter',sans-serif;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}
canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:.3}
.content{position:relative;z-index:1;text-align:center;padding:2rem}
.code{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(6rem,15vw,12rem);
  font-weight:900;
  background:linear-gradient(135deg,#00d4ff,#7c3aed,#00d4ff);
  background-size:200% 200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:gradShift 4s ease infinite;
  line-height:1;
  margin-bottom:1rem;
}
@keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.title{
  font-size:clamp(1.2rem,3vw,2rem);
  font-weight:700;
  color:#c0c0c0;
  margin-bottom:.5rem;
}
.subtitle{
  font-size:clamp(.9rem,2vw,1.1rem);
  color:#666;
  margin-bottom:2.5rem;
  font-family:'JetBrains Mono',monospace;
}
.home-btn{
  display:inline-block;
  padding:.9rem 2.5rem;
  background:linear-gradient(135deg,#00d4ff,#7c3aed);
  color:#fff;
  text-decoration:none;
  border-radius:50px;
  font-weight:700;
  font-size:1rem;
  transition:transform .3s,box-shadow .3s;
}
.home-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 0 30px rgba(0,212,255,.4),0 0 60px rgba(124,58,237,.2);
}
.pulse{
  position:absolute;
  width:300px;height:300px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(0,212,255,.08),transparent 70%);
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  animation:pulse 3s ease-in-out infinite;
}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.5}50%{transform:translate(-50%,-50%) scale(1.5);opacity:0}}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="pulse"></div>
<div class="content">
  <div class="code">404</div>
  <div class="title">Neural pathway not found</div>
  <div class="subtitle">The requested route does not exist in this model's weights.</div>
  <a href="/" class="home-btn">Return to NC AI</a>
</div>
<script>
const c=document.getElementById('bg'),x=c.getContext('2d');
function resize(){c.width=innerWidth;c.height=innerHeight}
resize();addEventListener('resize',resize);
const dots=[];
for(let i=0;i<50;i++)dots.push({x:Math.random()*c.width,y:Math.random()*c.height,vx:(Math.random()-.5)*.5,vy:(Math.random()-.5)*.5,r:2});
function draw(){
  x.clearRect(0,0,c.width,c.height);
  dots.forEach(d=>{
    d.x+=d.vx;d.y+=d.vy;
    if(d.x<0||d.x>c.width)d.vx*=-1;
    if(d.y<0||d.y>c.height)d.vy*=-1;
    x.beginPath();x.arc(d.x,d.y,d.r,0,Math.PI*2);
    x.fillStyle='rgba(0,212,255,.6)';x.fill();
  });
  for(let i=0;i<dots.length;i++)for(let j=i+1;j<dots.length;j++){
    const dx=dots[i].x-dots[j].x,dy=dots[i].y-dots[j].y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<150){x.beginPath();x.moveTo(dots[i].x,dots[i].y);x.lineTo(dots[j].x,dots[j].y);
    x.strokeStyle=`rgba(124,58,237,${1-dist/150})`;x.lineWidth=.5;x.stroke();}
  }
  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
